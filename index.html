<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
    <div class="library">
        <div class="book-collection">

        </div>
    </div>
    <dialog id="libDialog">
        <form method="dialog" >
            <label for="book-author">Enter the book author:</label>
            <input id="author" type="text">
            <label for="book-title">Enter the book title:</label>
            <input id="title" type="text">
            <label for="book-pages">Enter the amount of pages:</label>
            <input id="pages" type="number">
            <label for="book-pages">Did you finish it?</label>
            <input checked id="finished" type="checkbox">
            <button value="cancel" formmethod="dialog">Cancel</button>
            <button id="confirmBtn" value="default">Confirm</button>
        </form>
      </dialog>
      <button id="showDialog">Add a new book</button>
      <output></output>
</body>
</html>
