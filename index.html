<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
    <div class="library">
        <div class="book-collection">

        </div>
    </div>
    <dialog id="libDialog">
        <form method="dialog" >
            <label for="book">Enter the book author:</label>
            <input id="book-author" type="text">
            <label for="book">Enter the book title:</label>
            <input id="book-title" type="text">
            <label for="book">Enter the amount of pages:</label>
            <input id="book-pages" type="number">
            <label for="book">Did you finish it?</label>
            <select name="book-status" id="book-status">
                <option value="default">Choose…</option>
                <option value="planning">Planning</option>
                <option value="reading">Reading</option>
                <option value="finished">Finished</option>
            </select>
            <button value="cancel" formmethod="dialog">Cancel</button>
            <button id="confirmBtn" value="default">Confirm</button>
        </form>
      </dialog>
      <button id="showDialog">Add a new book</button>
      <output></output>
</body>
</html>
